<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>BTCUSDT 资金费率盯盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>BTCUSDT 资金费率盯盘 (纯盯盘模式)</h1>

    <div class="grid single">
        <div class="card">
            <h3>📊 当前计算数据</h3>
            <div class="data-grid">
                <div class="data-box highlight">
                    <div class="data-label">最新实时价格</div>
                    <div class="data-value price-text" id="currentPrice">--</div>
                </div>

                <div class="data-box highlight">
                    <div class="data-label">🎯 近 1H 瞬时费率情绪 (核心信号)</div>
                    <div class="data-value" id="rate1hDirection">--</div>
                    <div class="data-label" style="margin-top: 8px; font-size: 11px; text-transform: none;" id="rate1hDetail">等待数据...</div>
                </div>

                <div class="data-box">
                    <div class="data-label">瞬时预测费率 (仅供参考)</div>
                    <div class="data-value" id="currentRate">--</div>
                </div>
                <div class="data-box">
                    <div class="data-label">上期已结算费率 (币安返回)</div>
                    <div class="data-value" id="lastSettledRate">--</div>
                </div>
                <div class="data-box">
                    <div class="data-label">1小时预测均值</div>
                    <div class="data-value" id="rate1h">--</div>
                </div>
                <div class="data-box">
                    <div class="data-label">今日已结算累计 (UTC)</div>
                    <div class="data-value" id="rateDailySettled">--</div>
                </div>
            </div>

            <div style="margin-top: 20px; display: flex; gap: 12px; align-items: center;">
                <input type="password" id="authToken" placeholder="X-Auth-Token (仅清空历史时需要)" style="flex: 1;">
                <button onclick="resetHistory()" id="resetBtn" style="background: linear-gradient(135deg, #ef4444, #b91c1c); width: auto; padding: 12px 20px; margin: 0; white-space: nowrap;">
                    清空历史数据
                </button>
            </div>
            <p id="statusHint" style="margin-top: 12px; font-size: 12px; color: #64748b; text-align: center;"></p>
        </div>
    </div>

    <div class="grid">
        <div class="card chart-container">
            <h3>📈 8小时资金费率历史 (币安结算)</h3>
            <div id="chart8h" class="chart"></div>
        </div>
        <div class="card chart-container">
            <h3>📉 瞬时预测费率走势 (近90分钟)</h3>
            <div id="chart1h" class="chart"></div>
        </div>
    </div>

    <div class="grid">
        <div class="card chart-container" style="grid-column: 1 / -1;">
            <h3>🎯 近 1H 瞬时费率均值走势 (日内情绪曲线 · 最近 6 小时) <span style="font-size: 12px; color: #94a3b8; font-weight: 400;">正值 = 多头拥挤 · 负值 = 空头拥挤</span></h3>
            <div id="chart1hAvg" class="chart"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
